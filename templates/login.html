<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center h-screen">

<div class="bg-white shadow-lg rounded-xl p-10 w-96">
    <h1 class="text-2xl font-bold text-center mb-6 text-blue-700">Doctor Login</h1>

    <!-- 🔑 autocomplete OFF added here -->
    <form method="POST" class="space-y-4" autocomplete="off">

        <input type="text" name="username" placeholder="Username"
               autocomplete="off"
               class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
               required>

        <input type="password" name="password" placeholder="Password"
               autocomplete="new-password"
               class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
               required>

        <button type="submit"
                class="bg-blue-600 text-white w-full p-3 rounded hover:bg-blue-700 transition">
            Login
        </button>
    </form>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <p class="text-red-600 text-center mt-3 font-semibold">{{ messages[0] }}</p>
    {% endif %}
    {% endwith %}

    <p class="text-center text-gray-600 mt-4">
        New user?
        <a href="{{ url_for('register') }}" class="text-blue-500 hover:underline">
            Sign Up
        </a>
    </p>
</div>

</body>
</html>
