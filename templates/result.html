<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 text-center p-10">

<h1 class="text-3xl font-bold text-blue-800 mb-4">Diagnosis Result</h1>

<h2 class="text-xl font-bold text-center">
    Result: {{ result }}
</h2>

<p class="text-lg text-center text-gray-600">
    Confidence: {{ confidence }}%
</p>

<p class="text-xl font-semibold mb-2">{{ name }}</p>

<img src="{{ image }}" class="mx-auto w-64 rounded shadow mb-6">

<!-- Updated color logic -->
<p class="text-2xl font-bold {% if 'pneumonia' in result | lower %}text-red-600{% else %}text-green-600{% endif %}">
    {{ result }}
</p>

<a href="/dashboard" class="bg-blue-600 text-white px-6 py-3 rounded-lg mt-5 inline-block hover:bg-blue-700">
    Back to Dashboard
</a>

</body>
</html>
