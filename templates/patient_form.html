<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 to-blue-300 flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-2xl w-[400px] border border-gray-200">

    <h2 class="text-3xl font-bold text-center mb-6 text-blue-700">
        🩺 Add Patient Record
    </h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-4">

        <div>
            <label class="text-gray-700 font-semibold">Patient Name</label>
            <input name="name" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                   placeholder="Enter name" required>
        </div>

        <div>
            <label class="text-gray-700 font-semibold">Age</label>
            <input name="age" type="number" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                   placeholder="Enter age" required>
        </div>

        <div>
            <label class="text-gray-700 font-semibold">Gender</label>
            <select name="gender" 
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div>
            <label class="text-gray-700 font-semibold">Upload X-ray Image</label>
            <input type="file" name="xray" 
                   class="w-full p-3 border border-gray-300 rounded-lg cursor-pointer focus:ring-2 focus:ring-blue-500 outline-none" 
                   required>
        </div>

        <button class="bg-blue-600 text-white w-full p-3 rounded-lg hover:bg-blue-700 transition font-semibold">
            Submit
        </button>
    </form>

    <!-- Back Button -->
    <div class="mt-5 text-center">
        <a href="{{ url_for('dashboard') }}" 
           class="text-blue-700 font-semibold hover:underline">
           ⬅ Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
