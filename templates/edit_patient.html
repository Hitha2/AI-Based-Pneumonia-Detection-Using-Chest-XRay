<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="bg-white shadow-lg rounded-lg w-full max-w-md p-8">
    <h2 class="text-2xl font-bold text-center mb-6 text-blue-700">Edit Patient Details</h2>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-gray-700 font-medium mb-1">Name:</label>
            <input type="text" name="name" value="{{ patient[1] }}" required 
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 font-medium mb-1">Age:</label>
            <input type="number" name="age" value="{{ patient[2] }}" required
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 font-medium mb-1">Gender:</label>
            <select name="gender" 
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="Male" {% if patient[3]=='Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if patient[3]=='Female' %}selected{% endif %}>Female</option>
            </select>
        </div>

        <div class="text-center">
            <button type="submit" 
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition duration-300">
                Update
            </button>
        </div>
    </form>
</div>

</body>
</html>
