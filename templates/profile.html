{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow mt-8">
  <h2 class="text-xl font-semibold mb-4">My Profile</h2>
  <p><span class="font-semibold">Username:</span> {{ username }}</p>
  <p><span class="font-semibold">Full name:</span> {{ full_name }}</p>
  <p><span class="font-semibold">Age:</span> {{ age }}</p>
  <div class="mt-4">
    <a href="/dashboard" class="bg-blue-600 text-white px-4 py-2 rounded">Back to Dashboard</a>
  </div>
</div>
{% endblock %}
